name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Genera piattaforma Android
        working-directory: app
        run: |
          flutter create --org com.lucio --project-name baby_cry_translator --platforms android .
          # permesso microfono
          sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <application|' android/app/src/main/AndroidManifest.xml
          # nome app
          sed -i 's|android:label="baby_cry_translator"|android:label="Baby Cry Translator"|' android/app/src/main/AndroidManifest.xml

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Test (parità Dart/Python, non bloccante)
        working-directory: app
        continue-on-error: true
        run: flutter test

      - name: Build APK
        working-directory: app
        run: flutter build apk --release

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: baby-cry-translator-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
